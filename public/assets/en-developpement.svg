<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Projet en développement">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c0056"/>
      <stop offset="55%" stop-color="#7611a6"/>
      <stop offset="100%" stop-color="#c561f6"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <pattern id="stripes" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="20" height="40" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <rect width="1200" height="675" fill="url(#stripes)"/>

  <g transform="translate(600 250)" filter="url(#glow)">
    <g stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <circle cx="0" cy="0" r="56" stroke-opacity="0.9"/>
      <g stroke-opacity="0.9">
        <line x1="0" y1="-56" x2="0" y2="-78"/>
        <line x1="0" y1="56" x2="0" y2="78"/>
        <line x1="-56" y1="0" x2="-78" y2="0"/>
        <line x1="56" y1="0" x2="78" y2="0"/>
        <line x1="-40" y1="-40" x2="-55" y2="-55"/>
        <line x1="40" y1="-40" x2="55" y2="-55"/>
        <line x1="-40" y1="40" x2="-55" y2="55"/>
        <line x1="40" y1="40" x2="55" y2="55"/>
      </g>
      <circle cx="0" cy="0" r="14" fill="#ffffff" fill-opacity="0.9" stroke="none"/>
    </g>
  </g>

  <text x="600" y="430" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="68" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="4">EN DÉVELOPPEMENT</text>
  <text x="600" y="478" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="24" font-weight="400" fill="#ffffff" fill-opacity="0.75" text-anchor="middle" letter-spacing="2">Projet en cours de réalisation</text>

  <g transform="translate(450 540)">
    <rect width="300" height="8" rx="4" fill="#ffffff" fill-opacity="0.18"/>
    <rect width="180" height="8" rx="4" fill="#ffffff">
      <animate attributeName="width" values="40;300;40" dur="2.4s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
